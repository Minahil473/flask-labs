<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Feedback site{% endblock %}</title>

</head>

<body>
    <header>
        <h1>welcome to my site</h1>
        <nav>
            <a href="/">Home</a>
        </nav>
    </header>
    <main>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <p>{{ message }}</p>
        <ul style="color: green;">
            {% for msg in messages %}
            <li>{{ msg }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
    
</body>

</html>
