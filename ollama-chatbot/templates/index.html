<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Personal AI Chatbot</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

  <header>Personal AI Chatbot</header>

  <div id="chat-box"></div>

  <div id="input-area">
    <div id="input-row">
      <input type="text" id="user-input" placeholder="Message Personal AI..." autocomplete="off" />
      <button id="send-btn" onclick="sendMessage()">↑</button>
    </div>
    <div class="hint">Press Enter to send</div>
  </div>

<script>
  async function sendMessage() {
    const input = document.getElementById("user-input");
    const btn = document.getElementById("send-btn");
    const message = input.value.trim();
    if (!message) return;

    appendMessage(message, "user-msg");
    input.value = "";
    input.disabled = true;
    btn.disabled = true;

    // Show typing dots
    const typingId = showTypingIndicator();

    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    let botDiv = null; // ← not created yet

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const lines = decoder.decode(value).split("\n");
      for (const line of lines) {
        if (line.startsWith("data: ")) {
          const data = JSON.parse(line.slice(6));

          // First token arrives → remove dots, NOW create the bubble
          if (!botDiv) {
            removeTypingIndicator(typingId);
            botDiv = document.createElement("div");
            botDiv.className = "bot-msg";
            document.getElementById("chat-box").appendChild(botDiv);
          }

          botDiv.textContent += data.token;
          document.getElementById("chat-box").scrollTop = 99999;
        }
      }
    }

    input.disabled = false;
    btn.disabled = false;
    input.focus();
  }

  function appendMessage(text, cssClass) {
    const box = document.getElementById("chat-box");
    const div = document.createElement("div");
    div.className = cssClass;
    div.textContent = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function showTypingIndicator() {
    const box = document.getElementById("chat-box");
    const id = "typing-" + Date.now();
    const div = document.createElement("div");
    div.className = "bot-msg"; div.id = id;
    div.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    return id;
  }

  function removeTypingIndicator(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  document.getElementById("user-input").addEventListener("keydown", e => {
    if (e.key === "Enter") sendMessage();
  });
</script>

</body>
</html>
